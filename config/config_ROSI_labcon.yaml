ratslam_lv:
  ros__parameters:
    # image_crop_x_min: 40
    # image_crop_x_max: 600
    # image_crop_y_min: 150
    # image_crop_y_max: 300
    template_x_size: 60
    template_y_size: 10
    vt_shift_match: 5
    vt_step_match: 1
    vt_match_threshold: 0.085
    vt_normalisation: 0.4
    # draw
    enable: true
    vt_window_width: 640
    vt_window_height: 900

ratslam_pc:
  ros__parameters:
    pc_dim_xy: 30
    pc_dim_th: 36
    pc_w_e_dim: 7
    pc_w_i_dim: 5
    pc_w_e_var: 1
    pc_w_i_var: 2
    pc_global_inhib: 0.00002
    vt_active_decay: 1.0
    pc_vt_inject_energy: 0.15
    pc_cell_x_size: 0.03
    exp_delta_pc_threshold: 2.0
    pc_vt_restore: 0.05
    # draw
    enable: true

ratslam_em:
  ros__parameters:
    exp_correction: 0.5
    exp_loops: 10
    exp_initial_em_deg: 5.0
    max_goals: 10
    # draw
    enable: true

ratslam_vo:
  ros__parameters:
    vtrans_image_x_min: 195
    vtrans_image_x_max: 475
    vtrans_image_y_min: 270
    vtrans_image_y_max: 430
    vrot_image_x_min: 40
    vrot_image_x_max: 600
    vrot_image_y_min: 75
    vrot_image_y_max: 240
    camera_fov_deg: 180.0
    camera_hz: 0.20
    vtrans_scaling: 6.0
    vtrans_max: 0.5